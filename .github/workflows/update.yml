name: Update formula

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch latest version
        id: latest-version
        uses: octokit/graphql-action@ddde8ebb2493e79f390e6449c725c21663a67505 # v3.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          query: |
            query {
              vim: repository(owner:"vim", name:"vim") {
                refs(refPrefix:"refs/tags/", first:1, orderBy:{direction:DESC, field:TAG_COMMIT_DATE}) {
                  edges {
                    node {
                      name
                    }
                  }
                }
              }
            }

      - name: Set version
        run: echo "latest_version=${{ fromJSON(steps.latest-version.outputs.data).vim.refs.edges[0].node.name }}" >> "$GITHUB_ENV"

      - name: Check version format
        run: '[[ ${latest_version} =~ ^v[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+$ ]]'

      - name: Update formula
        run: |
          sed -i '/^  url /s/:tag => "v[^"]*"/:tag => "'"${latest_version}"'"/' Formula/vim.rb
          if ! git diff --exit-code Formula/vim.rb; then
            git config --local user.name 'github-actions[bot]'
            git config --local user.email 'github-actions[bot]@users.noreply.github.com'
            git add Formula/vim.rb
            git commit -m "vim: ${latest_version#v}"
            git push -u origin main
          fi
